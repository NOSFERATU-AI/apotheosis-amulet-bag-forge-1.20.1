name: Build Forge 1.20.1

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.8

      - name: Build
        run: gradle build --stacktrace --no-daemon

      - name: Upload jar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-1.20.1-build-output
          path: build/libs/*.jar
          if-no-files-found: ignore
